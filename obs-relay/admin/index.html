<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OBS Tally Relay - Admin</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      background: #0b1220;
      color: #e5eefb;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: #0f1729;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    h1 { font-size: 20px; margin: 0 0 12px; }
    h2 { font-size: 16px; margin: 0 0 10px; }
    input, button {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: #111a2d;
      color: #e5eefb;
      font: inherit;
    }
    button { cursor: pointer; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; }
    th, td { border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px; text-align: left; }
    tr:nth-child(even) { background: #10192a; }
    .stale { color: #f59e0b; font-weight: 600; }
    .fresh { color: #4ade80; font-weight: 600; }
    .latency-cell { min-width: 180px; }
    .latency-value { font-weight: 700; color: #e5eefb; }
    .latency-trend {
      display: block;
      margin-top: 4px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing: 0.08em;
      color: #93c5fd;
    }
    .latency-error { display: block; margin-top: 3px; color: #fca5a5; font-size: 12px; }
    .assistant-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .assistant-meta { color: #94a3b8; font-size: 13px; margin-top: 4px; }
    .assistant-log {
      display: grid;
      gap: 10px;
      min-height: 180px;
      max-height: 360px;
      overflow: auto;
      padding: 4px 2px;
    }
    .bubble {
      padding: 12px 14px;
      border-radius: 14px;
      white-space: pre-wrap;
      line-height: 1.4;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .bubble.user {
      margin-left: auto;
      background: #1d4ed8;
      color: #eff6ff;
      max-width: 85%;
    }
    .bubble.assistant {
      background: #111a2d;
      max-width: 100%;
    }
    .bubble.loading { opacity: 0.75; font-style: italic; }
    .assistant-input { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px; }
    .assistant-input input { flex: 1 1 320px; }
    .chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
    .chip {
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 999px;
      background: #111a2d;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .muted { color: #94a3b8; }
    .linkish { color: #93c5fd; text-decoration: none; }
    .statusline { color: #94a3b8; font-size: 13px; margin-top: 8px; }
    .statusline.live { color: #4ade80; }
  </style>
</head>
<body>
  <main class="page">
    <section class="panel">
      <h1>OBS Tally Relay — Admin</h1>
      <div class="row">
        <label>Source name: <input id="sourceName" placeholder="phone1"></label>
        <label>Callback URL: <input id="url" placeholder="http://192.168.x.y:8787"></label>
        <button id="register">Register</button>
      </div>
      <div class="muted">Phones keep their own callback URL, so the relay can follow them even if their IP changes.</div>
    </section>

    <section class="panel">
      <h2>Registered Devices</h2>
      <div id="relayStatus" class="statusline">Connecting to live relay updates...</div>
      <table id="devices">
        <thead><tr><th>Source</th><th>URL</th><th>Last Seen</th><th>Latency</th><th>Actions</th></tr></thead>
        <tbody></tbody>
      </table>
    </section>

    <section class="panel">
      <div class="assistant-header">
        <div>
          <h2>Diagnostic Assistant</h2>
          <div class="assistant-meta" id="assistantMeta">Checking relay health...</div>
        </div>
        <button id="refreshDiag">Refresh</button>
      </div>
      <div id="assistantLog" class="assistant-log" aria-live="polite"></div>
      <div class="chips">
        <button class="chip" data-question="Why is a phone stale?">Stale phone</button>
        <button class="chip" data-question="Why is tally not showing?">Tally not showing</button>
        <button class="chip" data-question="Is OBS connected?">OBS connection</button>
        <button class="chip" data-question="What should I fix first?">What should I fix first?</button>
      </div>
      <div class="assistant-input">
        <input id="assistantInput" placeholder="Ask me what is wrong, like: Why is phone1 not going live?" />
        <button id="assistantSend">Ask</button>
      </div>
    </section>
  </main>

  <script>
    const assistantLog = document.getElementById('assistantLog');
    const assistantMeta = document.getElementById('assistantMeta');
    const assistantInput = document.getElementById('assistantInput');

    function appendBubble(role, text, loading = false) {
      const bubble = document.createElement('div');
      bubble.className = `bubble ${role}${loading ? ' loading' : ''}`;
      bubble.textContent = text;
      assistantLog.appendChild(bubble);
      assistantLog.scrollTop = assistantLog.scrollHeight;
      return bubble;
    }

    function buildLatencySparkline(history) {
      const values = (history || []).map((value) => Number(value)).filter((value) => Number.isFinite(value) && value >= 0);
      if (!values.length) return '—';
      const blocks = '▁▂▃▄▅▆▇█';
      const min = Math.min(...values);
      const max = Math.max(...values);
      const span = Math.max(1, max - min);
      return values.slice(-18).map((value) => {
        const index = Math.max(0, Math.min(7, Math.round(((value - min) / span) * 7)));
        return blocks[index];
      }).join('');
    }

    function formatLatencyValue(device) {
      const value = Number(device && device.latencyMs);
      if (!Number.isFinite(value) || value < 0) return '—';
      return `${Math.round(value)} ms`;
    }

    function renderDevices(list, diagnostics) {
      const tbody = document.querySelector('#devices tbody');
      tbody.innerHTML = '';
      const staleMs = Number((diagnostics && diagnostics.deviceStaleMs) || 10000);
      list.forEach((d) => {
        const tr = document.createElement('tr');
        const ageMs = d.lastSeen ? (Date.now() - Number(d.lastSeen)) : null;
        const ageText = ageMs == null ? '' : (ageMs < staleMs ? 'fresh' : `${Math.round(ageMs / 1000)}s ago`);
        const ageClass = ageMs != null && ageMs < staleMs ? 'fresh' : 'stale';
        const latencyValue = formatLatencyValue(d);
        const latencyTrend = buildLatencySparkline(d.latencyHistory);
        const latencyError = d.latencyError ? `<span class="latency-error">${d.latencyError}</span>` : '';
        tr.innerHTML = `<td>${d.sourceName || ''}</td><td><a class="linkish" href="${d.url}" target="_blank">${d.url}</a></td><td class="${ageClass}">${ageText}</td><td class="latency-cell"><span class="latency-value">${latencyValue}</span><span class="latency-trend">${latencyTrend}</span>${latencyError}</td><td><button data-id="${d.id}" class="del">Delete</button></td>`;
        tbody.appendChild(tr);
      });
      document.querySelectorAll('.del').forEach((button) => {
        button.onclick = async (event) => {
          const id = event.target.dataset.id;
          await fetch('/api/devices/' + encodeURIComponent(id), { method: 'DELETE' });
          loadDevices();
        };
      });
    }

    function formatDiagnostics(diag) {
      if (!diag) return 'No diagnostics available';
      const connected = diag.connected ? 'OBS connected' : 'OBS disconnected';
      const deviceText = `${diag.freshDevices || 0}/${diag.totalDevices || 0} phones fresh`;
      const sceneText = diag.programScene ? `Program: ${diag.programScene}` : 'Program: unknown';
      return `${connected} · ${deviceText} · ${sceneText}`;
    }

    async function askAssistant(message) {
      const trimmed = String(message || '').trim();
      if (!trimmed) return;
      appendBubble('user', trimmed);
      const loadingBubble = appendBubble('assistant', 'Thinking...', true);
      assistantInput.value = '';
      try {
        const data = await apiJson('/api/assistant', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ message: trimmed }),
        });
        loadingBubble.textContent = data.reply || 'No reply returned.';
        loadingBubble.classList.remove('loading');
        if (data.diagnostics) assistantMeta.textContent = formatDiagnostics(data.diagnostics);
      } catch (error) {
        loadingBubble.textContent = `Assistant error: ${error.message}`;
        loadingBubble.classList.remove('loading');
      }
    }

    async function loadDevices() {
      try {
        const list = await apiJson('/api/devices');
        const diagnostics = await apiJson('/api/diagnostics');
        renderDevices(list, diagnostics);
        assistantMeta.textContent = formatDiagnostics(diagnostics);
      } catch (error) {
        assistantMeta.textContent = `Diagnostics unavailable: ${error.message}`;
      }
    }

    async function apiJson(path, options = {}) {
      const response = await fetch(path, options);
      const contentType = response.headers.get('content-type') || '';
      const bodyText = await response.text();

      if (!response.ok) {
        throw new Error(`${path} failed: ${response.status} ${bodyText.slice(0, 120)}`.trim());
      }

      if (!contentType.includes('application/json')) {
        throw new Error(`Expected JSON from ${path}, got ${contentType || 'unknown content type'}${bodyText.startsWith('<!DOCTYPE') ? ' (HTML page)' : ''}`);
      }

      try {
        return JSON.parse(bodyText);
      } catch (error) {
        throw new Error(`Could not parse JSON from ${path}: ${error.message}`);
      }
    }

    document.getElementById('register').onclick = async () => {
      const sourceName = document.getElementById('sourceName').value;
      const url = document.getElementById('url').value;
      if (!url) return alert('Enter url');
      if (!sourceName) return alert('Enter source name');
      await apiJson('/api/register', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({ sourceName, url }),
      });
      document.getElementById('sourceName').value = '';
      document.getElementById('url').value = '';
      loadDevices();
    };

    document.getElementById('assistantSend').onclick = () => askAssistant(assistantInput.value);
    assistantInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') askAssistant(assistantInput.value);
    });
    document.getElementById('refreshDiag').onclick = async () => {
      try {
        const data = await apiJson('/api/assistant', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ message: '' }),
        });
        appendBubble('assistant', data.reply || 'No diagnostics returned.');
        if (data.diagnostics) assistantMeta.textContent = formatDiagnostics(data.diagnostics);
      } catch (error) {
        appendBubble('assistant', `Assistant error: ${error.message}`);
      }
    };
    document.querySelectorAll('[data-question]').forEach((button) => {
      button.onclick = () => askAssistant(button.dataset.question);
    });

    appendBubble('assistant', 'I can check OBS, phone registration, tally mapping, stale heartbeats, and common setup problems. Ask me what looks wrong.');
    loadDevices();
    connectLiveUpdates();
  </script>
</body>
</html>
